<!DOCTYPE html>

  <meta charset="utf-8"/>

  <title>Platform Architecture — SaaS & PaaS</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@400;500;600;700;800;900&display=swap">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'VT323', monospace;
      background: #050508;
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid rgba(0,255,65,0.2);
    }
    .tab {
      background: rgba(20,20,20,0.9);
      border: 1px solid rgba(0,255,65,0.25);
      padding: 0.35rem 1.5rem;
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 1.15rem;
      color: #888;
      border-radius: 5px;
      transition: all 0.2s;
    }
    .tab:hover { color: #00ff41; }
    .tab.active {
      color: #00ff41;
      border-color: #00ff41;
      text-shadow: 0 0 10px #00ff41;
      background: rgba(0,255,65,0.06);
    }
    .sep { color: rgba(255,255,255,0.1); margin: 0 0.2rem; }
    .ctrl-btn {
      background: rgba(20,20,20,0.9);
      border: 1px solid rgba(0,255,65,0.25);
      color: #00ff41;
      padding: 0.3rem 0.8rem;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .ctrl-btn:hover { background: rgba(0,255,65,0.08); box-shadow: 0 0 8px rgba(0,255,65,0.2); }
    #cy-container {
      width: 100%;
      height: calc(100vh - 50px);
    }
    .footer-info {
      position: fixed;
      bottom: 8px; left: 8px;
      font-size: 0.7rem;
      color: #666;
      background: rgba(5,5,5,0.9);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid rgba(0,255,65,0.15);
      z-index: 2000;
    }
  </style>
</head>
<body>

<div class="controls">
  <div class="tab active" data-tab="saas">SaaS</div>
  <div class="tab" data-tab="paas">PaaS (Now)</div>
  <div class="tab" data-tab="paas-hybrid">PaaS (Hybrid OnPrem Stage 0)</div>
  <span class="sep">|</span>
  <button class="ctrl-btn" id="btn-fit">FIT</button>
  <button class="ctrl-btn" id="btn-reset">RESET</button>
  <span class="sep">|</span>
  <button class="ctrl-btn" id="btn-anim">PAUSE</button>
  <span class="sep">|</span>
  <button class="ctrl-btn" id="btn-export">EXPORT</button>
  <button class="ctrl-btn" id="btn-import">IMPORT</button>
</div>

<!-- Hidden file input for import -->
<input type="file" id="import-file" accept=".json" style="display:none">

<div id="cy-container"></div>

<div class="footer-info">
  Drag nodes | Scroll zoom | 1/2=tabs | F=fit | R=reset | P=pause

// ============================================================

var cy = null;
var currentTab = 'saas';

function storageKey() { return 'cy-pos-' + currentTab; }

function savePos() {
  var pos = {};
  cy.nodes().forEach(function(nd) { if (!nd.isParent()) pos[nd.id()] = nd.position(); });
  try { localStorage.setItem(storageKey(), JSON.stringify(pos)); } catch(e) {}
}

function loadPos() {
  try { var d = localStorage.getItem(storageKey()); return d ? JSON.parse(d) : null; } catch(e) { return null; }
}

function initGraph(tab) {
  currentTab = tab;
  var tabData = {
    'saas': { nodes: saasNodes, edges: saasEdges, pos: saasPos },
    'paas': { nodes: paasNodes, edges: paasEdges, pos: paasPos },
    'paas-hybrid': { nodes: paasHybridNodes, edges: paasHybridEdges, pos: paasHybridPos },
  };
  var d = tabData[tab] || tabData['saas'];
  var nodes = d.nodes;
  var edges = d.edges;
  var defPos = d.pos;
  var saved = loadPos();
  var positions = saved || defPos;

  if (cy) cy.destroy();

  cy = cytoscape({
    container: document.getElementById('cy-container'),
    elements: { nodes: nodes, edges: edges },
    style: cyStyle,
    layout: {
      name: 'preset',
      positions: function(node) { return positions[node.id()] || {x:480,y:400}; },
      fit: true,
      padding: 50,
    },
    minZoom: 0.2,
    maxZoom: 4,
    wheelSensitivity: 0.25,
    boxSelectionEnabled: false,
  });

  cy.on('dragfree', 'node', savePos);

  // Start animations
  startAnimations();
}

// ============================================================
// ANIMATIONS
// ============================================================
var animFrameId = null;
var animPaused = false;

function startAnimations() {
  if (animFrameId) cancelAnimationFrame(animFrameId);

  // 1. Edge flow animation (animated dash offset)
  var dashOffset = 0;
  function animateEdges() {
    dashOffset -= 0.8;
    cy.edges().forEach(function(edge) {
      var t = edge.data('type');
      if (t === 'mesh') {
        edge.style('line-dash-offset', dashOffset * 0.4);
      } else if (t === 'artifact-pull') {
        edge.style('line-dash-offset', dashOffset * 1.2);
      } else {
        edge.style('line-dash-offset', dashOffset);
      }
    });
  }

  // 2. Node border glow pulse
  var pulsePhase = 0;
  function animateNodes() {
    pulsePhase += 0.03;
    cy.nodes().forEach(function(node) {
      if (node.isParent()) return;
      var type = node.data('type');
      var baseWidth;
      if (type === 'cloud') baseWidth = 2.5;
      else if (type === 'tentpole' || type === 'expressroute' || type === 'internet' || type === 'artifactory') baseWidth = 2;
      else baseWidth = 1.5;

      // Each node gets a slightly different phase based on id hash
      var idHash = 0;
      var id = node.id();
      for (var i = 0; i < id.length; i++) idHash += id.charCodeAt(i);
      var nodePhase = pulsePhase + (idHash % 10) * 0.628;

      var pulse = Math.sin(nodePhase) * 0.5 + 0.5; // 0..1
      var bw = baseWidth + pulse * 1.2;
      var opacity = 0.7 + pulse * 0.3;
      node.style('border-width', bw);
      node.style('border-opacity', opacity);
    });
  }

  // 3. Canvas overlay for data packets traveling along edges
  var canvas = document.getElementById('packet-canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'packet-canvas';
    canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;';
    document.getElementById('cy-container').style.position = 'relative';
    document.getElementById('cy-container').appendChild(canvas);
  }
  var ctx = canvas.getContext('2d');

  // Packet pool
  var packets = [];
  function initPackets() {
    packets = [];
    cy.edges().forEach(function(edge) {
      var type = edge.data('type');
      if (type === 'mesh') return; // no packets on mesh
      var color = edge.data('color');
      // 1-2 packets per edge at different phases
      var count = (type === 'artifact-pull') ? 1 : 2;
      for (var i = 0; i < count; i++) {
        packets.push({
          edge: edge,
          t: Math.random(), // position along edge 0..1
          speed: 0.002 + Math.random() * 0.003,
          color: color,
          size: (type === 'artifact-pull') ? 3 : 2.5,
        });
      }
    });
  }
  initPackets();

  function drawPackets() {
    var container = document.getElementById('cy-container');
    var rect = container.getBoundingClientRect();
    canvas.width = rect.width * (window.devicePixelRatio || 1);
    canvas.height = rect.height * (window.devicePixelRatio || 1);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform((window.devicePixelRatio || 1), 0, 0, (window.devicePixelRatio || 1), 0, 0);
    ctx.clearRect(0, 0, rect.width, rect.height);

    var pan = cy.pan();
    var zoom = cy.zoom();

    packets.forEach(function(pkt) {
      pkt.t += pkt.speed;
      if (pkt.t > 1) pkt.t -= 1;

      var src = pkt.edge.source();
      var tgt = pkt.edge.target();
      var sp = src.position();
      var tp = tgt.position();

      // Interpolate position
      var x = sp.x + (tp.x - sp.x) * pkt.t;
      var y = sp.y + (tp.y - sp.y) * pkt.t;

      // Transform to screen coords
      var sx = x * zoom + pan.x;
      var sy = y * zoom + pan.y;

      var r = pkt.size * zoom;
      if (r < 1) r = 1;
      if (r > 6) r = 6;

      // Glow
      ctx.beginPath();
      ctx.arc(sx, sy, r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = pkt.color.replace(')', ',0.15)').replace('rgb', 'rgba').replace('#', '');
      // Convert hex to rgba for glow
      var gc = hexToRgba(pkt.color, 0.2);
      ctx.fillStyle = gc;
      ctx.fill();

      // Packet dot
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fillStyle = pkt.color;
      ctx.shadowColor = pkt.color;
      ctx.shadowBlur = 8 * zoom;
      ctx.fill();
      ctx.shadowBlur = 0;
    });
  }

  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // Animation loop
  function loop() {
    if (animPaused) {
      animFrameId = requestAnimationFrame(loop);
      return;
    }
    animateEdges();
    animateNodes();
    drawPackets();
    animFrameId = requestAnimationFrame(loop);
  }
  loop();
}

function toggleAnim() {
  animPaused = !animPaused;
  var btn = document.getElementById('btn-anim');
  btn.textContent = animPaused ? 'PLAY' : 'PAUSE';
  if (animPaused) {
    // Clear packet canvas
    var canvas = document.getElementById('packet-canvas');
    if (canvas) {
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
}

// ============================================================
// EVENTS
// ============================================================
document.addEventListener('DOMContentLoaded', function() { initGraph('saas'); });

document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    this.classList.add('active');
    initGraph(this.getAttribute('data-tab'));
  });
});

document.getElementById('btn-fit').addEventListener('click', function() {
  if (cy) cy.animate({ fit: { eles: cy.elements(), padding: 50 }}, { duration: 300 });
});

document.getElementById('btn-reset').addEventListener('click', function() {
  localStorage.removeItem('cy-pos-saas');
  localStorage.removeItem('cy-pos-paas');
  localStorage.removeItem('cy-pos-paas-hybrid');
  animPaused = false;
  document.getElementById('btn-anim').textContent = 'PAUSE';
  initGraph(currentTab);
});

document.getElementById('btn-anim').addEventListener('click', toggleAnim);

// Export positions as JSON file
document.getElementById('btn-export').addEventListener('click', function() {
  var data = {
    tab: currentTab,
    positions: {}
  };
  cy.nodes().forEach(function(nd) {
    if (!nd.isParent()) data.positions[nd.id()] = nd.position();
  });
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'layout-' + currentTab + '.json';
  a.click();
  URL.revokeObjectURL(url);
});

// Import positions from JSON file
document.getElementById('btn-import').addEventListener('click', function() {
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change', function(ev) {
  var file = ev.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (data.positions) {
        // Switch tab if needed
        if (data.tab && data.tab !== currentTab) {
          document.querySelector('[data-tab="' + data.tab + '"]').click();
        }
        // Save and reload
        localStorage.setItem('cy-pos-' + (data.tab || currentTab), JSON.stringify(data.positions));
        initGraph(data.tab || currentTab);
      }
    } catch(err) {
      alert('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  // Reset input so same file can be re-imported
  ev.target.value = '';
});

document.addEventListener('keydown', function(ev) {
  if (ev.key==='p'||ev.key==='P') toggleAnim();
  else if (ev.key==='1') document.querySelector('[data-tab="saas"]').click();
  else if (ev.key==='2') document.querySelector('[data-tab="paas"]').click();
  else if (ev.key==='f'||ev.key==='F') document.getElementById('btn-fit').click();
  else if (ev.key==='r'||ev.key==='R') document.getElementById('btn-reset').click();
});
</script>
</body>
</html>
