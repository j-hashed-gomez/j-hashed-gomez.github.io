      font-size: 1.15rem;
      color: #888;
      border-radius: 5px;
      transition: all 0.2s;
    }
    .tab:hover { color: #00ff41; }

      border-color: #00ff41;

      background: rgba(0,255,65,0.06);

      border: 1px solid rgba(0,255,65,0.25);
      color: #00ff41;
      padding: 0.3rem 0.8rem;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 0.95rem;

    .ctrl-btn:hover { background: rgba(0,255,65,0.08); box-shadow: 0 0 8px rgba(0,255,65,0.2); }

      height: calc(100vh - 50px);

      pointer-events: none;
      z-index: 900;
      cursor: crosshair;

    #text-input {

      border: 1px solid #ff4081;
      color: #ff4081;

      padding: 4px 6px;
      border-radius: 4px;

      border-color: #ff4081 !important;
      text-shadow: 0 0 10px #ff4081;
      background: rgba(255,64,129,0.1) !important;

var cy = null;

function storageKey() { return 'cy-pos-' + currentTab; }

function savePos() {
  var pos = {};
  cy.nodes().forEach(function(nd) { if (!nd.isParent()) pos[nd.id()] = nd.position(); });

}

function loadPos() {
  try { var d = localStorage.getItem(storageKey()); return d ? JSON.parse(d) : null; } catch(e) { return null; }
}

  var nodes = d.nodes;
  var edges = d.edges;
  var defPos = d.pos;
  var saved = loadPos();
  var positions = saved || defPos;

  if (cy) cy.destroy();

  cy = cytoscape({
    container: document.getElementById('cy-container'),
    elements: { nodes: nodes, edges: edges },
    style: cyStyle,
    layout: {
      name: 'preset',
      positions: function(node) { return positions[node.id()] || {x:480,y:400}; },
      fit: true,
      padding: 50,
    },
    minZoom: 0.2,
    maxZoom: 4,
    wheelSensitivity: 0.25,
    boxSelectionEnabled: false,
  });

  cy.on('dragfree', 'node', savePos);

  // Start animations
  startAnimations();
}

// ============================================================
// ANIMATIONS
// ============================================================
var animFrameId = null;
var animPaused = false;

function startAnimations() {
  if (animFrameId) cancelAnimationFrame(animFrameId);

  // 1. Edge flow animation (animated dash offset)
  var dashOffset = 0;
  function animateEdges() {
    dashOffset -= 0.8;
    cy.edges().forEach(function(edge) {
      var t = edge.data('type');
      if (t === 'mesh') {
        edge.style('line-dash-offset', dashOffset * 0.4);
      } else if (t === 'artifact-pull') {
        edge.style('line-dash-offset', dashOffset * 1.2);
      } else {
        edge.style('line-dash-offset', dashOffset);
      }
    });
  }

  // 2. Node border glow pulse
  var pulsePhase = 0;
  function animateNodes() {
    pulsePhase += 0.03;
    cy.nodes().forEach(function(node) {
      if (node.isParent()) return;
      var type = node.data('type');
      var baseWidth;
      if (type === 'cloud') baseWidth = 2.5;
      else if (type === 'tentpole' || type === 'expressroute' || type === 'internet' || type === 'artifactory') baseWidth = 2;
      else baseWidth = 1.5;

      // Each node gets a slightly different phase based on id hash
      var idHash = 0;
      var id = node.id();
      for (var i = 0; i < id.length; i++) idHash += id.charCodeAt(i);
      var nodePhase = pulsePhase + (idHash % 10) * 0.628;

      var pulse = Math.sin(nodePhase) * 0.5 + 0.5; // 0..1
      var bw = baseWidth + pulse * 1.2;
      var opacity = 0.7 + pulse * 0.3;
      node.style('border-width', bw);
      node.style('border-opacity', opacity);
    });
  }

  // 3. Canvas overlay for data packets traveling along edges
  var canvas = document.getElementById('packet-canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'packet-canvas';
    canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;';
    document.getElementById('cy-container').style.position = 'relative';
    document.getElementById('cy-container').appendChild(canvas);
  }
  var ctx = canvas.getContext('2d');

  // Packet pool
  var packets = [];

  // Compute upstream flow weight for each node (how many leaf paths feed into it)
  function computeFlowWeights() {
    var weights = {};
    var visited = {};
    var nodes = cy.nodes();
    var edges = cy.edges().filter(function(e) { return e.data('type') !== 'mesh'; });

    // Find leaf sources: nodes with no incoming non-mesh edges
    nodes.forEach(function(nd) {
      var incoming = edges.filter(function(e) { return e.data('target') === nd.id(); });
      if (incoming.length === 0 && !nd.isParent()) {
        weights[nd.id()] = 1;
      }
    });

    // BFS propagation: accumulate weights through the graph
    var changed = true;
    var maxIter = 20;
    while (changed && maxIter-- > 0) {
      changed = false;
      edges.forEach(function(e) {
        var srcId = e.data('source');
        var tgtId = e.data('target');
        if (weights[srcId] && !visited[e.id()]) {
          weights[tgtId] = (weights[tgtId] || 0) + weights[srcId];
          visited[e.id()] = true;
          changed = true;
        }
      });
    }
    return weights;
  }

  function initPackets() {
    packets = [];
    var weights = computeFlowWeights();
    cy.edges().forEach(function(edge) {
      var type = edge.data('type');
      if (type === 'mesh') return;
      var color = edge.source().style('border-color');
      var srcWeight = weights[edge.data('source')] || 1;
      var count = Math.max(1, Math.min(srcWeight, 6));
      for (var i = 0; i < count; i++) {
        packets.push({
          edge: edge,
          t: Math.random(),
          speed: 0.002 + Math.random() * 0.003,
          color: color,
          size: (type === 'artifact-pull') ? 3 : 2.5,
          reverse: false,
        });
      }
      // Bidirectional: reverse packets on all edges
      var revColor = edge.target().style('border-color');
      var revCount = Math.max(1, Math.floor(count * 0.7));
      for (var j = 0; j < revCount; j++) {
        packets.push({
          edge: edge,
          t: Math.random(),
          speed: 0.002 + Math.random() * 0.003,
          color: revColor,
          size: 2,
          reverse: true,
        });
      }
    });
  }
  initPackets();

  function drawPackets() {
    var container = document.getElementById('cy-container');
    var rect = container.getBoundingClientRect();
    canvas.width = rect.width * (window.devicePixelRatio || 1);
    canvas.height = rect.height * (window.devicePixelRatio || 1);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform((window.devicePixelRatio || 1), 0, 0, (window.devicePixelRatio || 1), 0, 0);
    ctx.clearRect(0, 0, rect.width, rect.height);

    var pan = cy.pan();
    var zoom = cy.zoom();

    packets.forEach(function(pkt) {
      pkt.t += pkt.speed;
      if (pkt.t > 1) pkt.t -= 1;

      var src = pkt.edge.source();
      var tgt = pkt.edge.target();
      var sp = src.position();
      var tp = tgt.position();

      // Interpolate position (reverse packets travel target→source)
      var progress = pkt.reverse ? (1 - pkt.t) : pkt.t;
      var x = sp.x + (tp.x - sp.x) * progress;
      var y = sp.y + (tp.y - sp.y) * progress;

      // Transform to screen coords
      var sx = x * zoom + pan.x;
      var sy = y * zoom + pan.y;

      var r = pkt.size * zoom;
      if (r < 1) r = 1;
      if (r > 6) r = 6;

      // Glow
      ctx.beginPath();
      ctx.arc(sx, sy, r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = pkt.color.replace(')', ',0.15)').replace('rgb', 'rgba').replace('#', '');
      // Convert hex to rgba for glow
      var gc = hexToRgba(pkt.color, 0.2);
      ctx.fillStyle = gc;
      ctx.fill();

      // Packet dot
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fillStyle = pkt.color;
      ctx.shadowColor = pkt.color;
      ctx.shadowBlur = 8 * zoom;
      ctx.fill();
      ctx.shadowBlur = 0;
    });
  }

  function hexToRgba(color, alpha) {
    if (color.indexOf('rgb') === 0) {
      var parts = color.match(/\d+/g);
      return 'rgba(' + parts[0] + ',' + parts[1] + ',' + parts[2] + ',' + alpha + ')';
    }
    var r = parseInt(color.slice(1,3), 16);
    var g = parseInt(color.slice(3,5), 16);
    var b = parseInt(color.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // Animation loop
  function loop() {
    if (animPaused) {
      animFrameId = requestAnimationFrame(loop);
      return;
    }
    animateEdges();
    animateNodes();
    drawPackets();
    animFrameId = requestAnimationFrame(loop);
  }
  loop();
}

function toggleAnim() {
  animPaused = !animPaused;
  var btn = document.getElementById('btn-anim');
  btn.textContent = animPaused ? 'PLAY' : 'PAUSE';
  if (animPaused) {
    // Clear packet canvas
    var canvas = document.getElementById('packet-canvas');
    if (canvas) {
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
}

// ============================================================
// EVENTS
// ============================================================
document.addEventListener('DOMContentLoaded', function() { initGraph('saas'); });

document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    this.classList.add('active');
    initGraph(this.getAttribute('data-tab'));
  });
});

document.getElementById('btn-fit').addEventListener('click', function() {
  if (cy) cy.animate({ fit: { eles: cy.elements(), padding: 50 }}, { duration: 300 });
});

document.getElementById('btn-reset').addEventListener('click', function() {
  localStorage.removeItem('cy-pos-saas');
  localStorage.removeItem('cy-pos-paas');
  localStorage.removeItem('cy-pos-paas-hybrid');
  localStorage.removeItem('cy-pos-paas-hybrid-1');
  localStorage.removeItem('cy-pos-paas-hybrid-2');
  localStorage.removeItem('cy-pos-paas-future');
  localStorage.removeItem('cy-pos-aks-infra');
  animPaused = false;
  document.getElementById('btn-anim').textContent = 'PAUSE';
  initGraph(currentTab);
});

document.getElementById('btn-anim').addEventListener('click', toggleAnim);

// Export positions as JSON file
document.getElementById('btn-export').addEventListener('click', function() {
  var data = {
    tab: currentTab,
    positions: {}
  };
  cy.nodes().forEach(function(nd) {
    if (!nd.isParent()) data.positions[nd.id()] = nd.position();
  });
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'layout-' + currentTab + '.json';
  a.click();
  URL.revokeObjectURL(url);
});


// ============================================================
// DRAWING ENGINE
// ============================================================
var drawCanvas = document.getElementById('draw-overlay');
var drawCtx = drawCanvas.getContext('2d');
var drawing = false;
var drawMode = false;
var drawTool = 'free';
var startX, startY;
var snapshot; // to restore canvas when previewing shapes
var undoStack = [];
var redoStack = [];
var MAX_UNDO = 50;

function saveUndoState() {
  undoStack.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
  drawCtx.putImageData(undoStack.pop(), 0, 0);
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
  drawCtx.putImageData(redoStack.pop(), 0, 0);
}

function resizeDrawCanvas() {
  var img = drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
  drawCanvas.width = window.innerWidth;
  drawCanvas.height = window.innerHeight;
  drawCtx.putImageData(img, 0, 0);
}
resizeDrawCanvas();
window.addEventListener('resize', resizeDrawCanvas);

function getDrawStyle() {
  var color = document.getElementById('draw-color').value;
  var width = parseInt(document.getElementById('draw-width').value);
  var dash = document.getElementById('draw-dash').value;
  var dashPattern = [];
  if (dash === 'dashed') dashPattern = [width * 4, width * 2];
  else if (dash === 'dotted') dashPattern = [width, width * 2];
  return { color: color, width: width, dash: dashPattern };
}

function applyStyle(ctx, style) {
  ctx.strokeStyle = style.color;
  ctx.lineWidth = style.width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.setLineDash(style.dash);
}

function drawArrowHead(ctx, fromX, fromY, toX, toY, size) {
  var angle = Math.atan2(toY - fromY, toX - fromX);
  ctx.beginPath();
  ctx.moveTo(toX, toY);
  ctx.lineTo(toX - size * Math.cos(angle - Math.PI / 6), toY - size * Math.sin(angle - Math.PI / 6));
  ctx.moveTo(toX, toY);
  ctx.lineTo(toX - size * Math.cos(angle + Math.PI / 6), toY - size * Math.sin(angle + Math.PI / 6));
  ctx.stroke();
}

// Text tool
var textInput = document.getElementById('text-input');
var textX, textY;

function commitText() {
  var val = textInput.value.trim();
  if (val) {
    saveUndoState();
    var style = getDrawStyle();
    var fontSize = parseInt(document.getElementById('draw-fontsize').value);
    drawCtx.font = fontSize + 'px VT323, monospace';
    drawCtx.fillStyle = style.color;
    drawCtx.fillText(val, textX, textY);
  }
  textInput.style.display = 'none';
  textInput.value = '';
}

textInput.addEventListener('keydown', function(e) {
  e.stopPropagation();
  if (e.key === 'Enter') { commitText(); }
  else if (e.key === 'Escape') { textInput.style.display = 'none'; textInput.value = ''; }
});

textInput.addEventListener('blur', function() { commitText(); });

// Tool buttons
document.querySelectorAll('.tool-btn[data-tool]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    drawTool = btn.getAttribute('data-tool');
  });
});

// Mouse events
drawCanvas.addEventListener('mousedown', function(e) {
  if (!drawMode) return;
  e.stopPropagation(); e.preventDefault();
  if (drawTool === 'text') {
    var fontSize = parseInt(document.getElementById('draw-fontsize').value);
    textX = e.offsetX;
    textY = e.offsetY;
    textInput.style.left = e.clientX + 'px';
    textInput.style.top = (e.clientY - fontSize) + 'px';
    textInput.style.fontSize = fontSize + 'px';
    textInput.style.color = document.getElementById('draw-color').value;
    textInput.style.display = 'block';
    textInput.focus();
    return;
  }
  saveUndoState();
  drawing = true;
  startX = e.offsetX;
  startY = e.offsetY;
  var style = getDrawStyle();
  if (drawTool === 'free') {
    drawCtx.beginPath();
    drawCtx.moveTo(startX, startY);
    applyStyle(drawCtx, style);
  } else {
    snapshot = drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
  }
});

drawCanvas.addEventListener('mousemove', function(e) {
  if (!drawing) return;
  e.stopPropagation(); e.preventDefault();
  var mx = e.offsetX, my = e.offsetY;
  var style = getDrawStyle();

  if (drawTool === 'free') {
    drawCtx.lineTo(mx, my);
    drawCtx.stroke();
    return;
  }

  // Restore snapshot and draw preview
  drawCtx.putImageData(snapshot, 0, 0);
  applyStyle(drawCtx, style);
  drawCtx.beginPath();

  if (drawTool === 'line' || drawTool === 'arrow') {
    drawCtx.moveTo(startX, startY);
    drawCtx.lineTo(mx, my);
    drawCtx.stroke();
    if (drawTool === 'arrow') drawArrowHead(drawCtx, startX, startY, mx, my, style.width * 5 + 8);
  } else if (drawTool === 'rect') {
    drawCtx.strokeRect(startX, startY, mx - startX, my - startY);
  } else if (drawTool === 'circle') {
    var radius = Math.sqrt(Math.pow(mx - startX, 2) + Math.pow(my - startY, 2));
    drawCtx.arc(startX, startY, radius, 0, Math.PI * 2);
    drawCtx.stroke();
  } else if (drawTool === 'ellipse') {
    var rx = Math.abs(mx - startX);
    var ry = Math.abs(my - startY);
    var cx = (startX + mx) / 2;
    var cy2 = (startY + my) / 2;
    drawCtx.ellipse(cx, cy2, rx / 2, ry / 2, 0, 0, Math.PI * 2);
    drawCtx.stroke();
  }
});

drawCanvas.addEventListener('mouseup', function(e) {
  if (!drawing) return;
  e.stopPropagation();
  drawing = false;
  snapshot = null;
});
drawCanvas.addEventListener('mouseleave', function() { drawing = false; snapshot = null; });
drawCanvas.addEventListener('wheel', function(e) { if (drawMode) { e.stopPropagation(); e.preventDefault(); } }, { passive: false });

// Touch support
function touchPos(e) {
  var t = e.touches[0];
  var r = drawCanvas.getBoundingClientRect();
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

drawCanvas.addEventListener('touchstart', function(e) {
  if (!drawMode) return;
  e.preventDefault();
  var p = touchPos(e);
  if (drawTool === 'text') {
    var fontSize = parseInt(document.getElementById('draw-fontsize').value);
    textX = p.x;
    textY = p.y;
    var t = e.touches[0];
    textInput.style.left = t.clientX + 'px';
    textInput.style.top = (t.clientY - fontSize) + 'px';
    textInput.style.fontSize = fontSize + 'px';
    textInput.style.color = document.getElementById('draw-color').value;
    textInput.style.display = 'block';
    textInput.focus();
    return;
  }
  saveUndoState();
  drawing = true;
  startX = p.x; startY = p.y;
  var style = getDrawStyle();
  if (drawTool === 'free') {
    drawCtx.beginPath();
    drawCtx.moveTo(startX, startY);
    applyStyle(drawCtx, style);
  } else {
    snapshot = drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
  }
}, { passive: false });

drawCanvas.addEventListener('touchmove', function(e) {
  if (!drawing) return;
  e.preventDefault();
  var p = touchPos(e);
  var style = getDrawStyle();

  if (drawTool === 'free') {
    drawCtx.lineTo(p.x, p.y);
    drawCtx.stroke();
    return;
  }

  drawCtx.putImageData(snapshot, 0, 0);
  applyStyle(drawCtx, style);
  drawCtx.beginPath();

  if (drawTool === 'line' || drawTool === 'arrow') {
    drawCtx.moveTo(startX, startY);
    drawCtx.lineTo(p.x, p.y);
    drawCtx.stroke();
    if (drawTool === 'arrow') drawArrowHead(drawCtx, startX, startY, p.x, p.y, style.width * 5 + 8);
  } else if (drawTool === 'rect') {
    drawCtx.strokeRect(startX, startY, p.x - startX, p.y - startY);
  } else if (drawTool === 'circle') {
    var radius = Math.sqrt(Math.pow(p.x - startX, 2) + Math.pow(p.y - startY, 2));
    drawCtx.arc(startX, startY, radius, 0, Math.PI * 2);
    drawCtx.stroke();
  } else if (drawTool === 'ellipse') {
    var rx = Math.abs(p.x - startX);
    var ry = Math.abs(p.y - startY);
    var cx = (startX + p.x) / 2;
    var cy2 = (startY + p.y) / 2;
    drawCtx.ellipse(cx, cy2, rx / 2, ry / 2, 0, 0, Math.PI * 2);
    drawCtx.stroke();
  }
}, { passive: false });

drawCanvas.addEventListener('touchend', function() { drawing = false; snapshot = null; });

// Draw mode toggle
function setDrawMode(on) {
  drawMode = on;
  drawing = false;
  snapshot = null;
  drawCanvas.classList.toggle('active', drawMode);
  document.getElementById('cy-container').classList.toggle('drawing-mode', drawMode);
  document.getElementById('draw-toolbar').classList.toggle('visible', drawMode);
  var btn = document.getElementById('btn-draw');
  btn.classList.toggle('draw-active', drawMode);
  btn.textContent = drawMode ? 'DRAW ON' : 'DRAW';
  if (cy) {
    cy.userPanningEnabled(!drawMode);
    cy.userZoomingEnabled(!drawMode);
    cy.boxSelectionEnabled(!drawMode);
    cy.nodes().ungrabify();
    if (!drawMode) cy.nodes().grabify();
  }
}

document.getElementById('btn-draw').addEventListener('click', function() {
  setDrawMode(!drawMode);
});

document.getElementById('btn-clear').addEventListener('click', function() {
  saveUndoState();
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
});

document.getElementById('btn-undo').addEventListener('click', function() { undo(); });
document.getElementById('btn-redo').addEventListener('click', function() { redo(); });

// Export SVG of current tab
document.getElementById('btn-svg').addEventListener('click', function() {
  var svgContent = cy.svg({ scale: 1, full: true, bg: '#050508' });
  var blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'platform-' + currentTab + '.svg';
  a.click();
  URL.revokeObjectURL(url);
});

document.addEventListener('keydown', function(ev) {
  if (drawMode && ev.ctrlKey && ev.key === 'z') { ev.preventDefault(); undo(); }
  else if (drawMode && ev.ctrlKey && ev.key === 'y') { ev.preventDefault(); redo(); }
  else if (ev.key==='p'||ev.key==='P') toggleAnim();
  else if (ev.key==='1') document.querySelector('[data-tab="saas"]').click();
  else if (ev.key==='2') document.querySelector('[data-tab="paas"]').click();
  else if (ev.key==='3') document.querySelector('[data-tab="paas-hybrid"]').click();
  else if (ev.key==='4') document.querySelector('[data-tab="paas-hybrid-1"]').click();
  else if (ev.key==='5') document.querySelector('[data-tab="paas-hybrid-2"]').click();
  else if (ev.key==='6') document.querySelector('[data-tab="paas-future"]').click();
  else if (ev.key==='7') document.querySelector('[data-tab="aks-infra"]').click();
  else if (ev.key==='f'||ev.key==='F') document.getElementById('btn-fit').click();
  else if (ev.key==='r'||ev.key==='R') document.getElementById('btn-reset').click();
  else if (ev.key==='d'||ev.key==='D') document.getElementById('btn-draw').click();
});
