  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'VT323', monospace;
      background: #050508;
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid rgba(0,255,65,0.2);
    }
    .tab {
      background: rgba(20,20,20,0.9);
      border: 1px solid rgba(0,255,65,0.25);
      padding: 0.35rem 1.5rem;
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 1.15rem;
      color: #888;
      border-radius: 5px;
      transition: all 0.2s;
    }
    .tab:hover { color: #00ff41; }
    .tab.active {
      color: #00ff41;
      border-color: #00ff41;
      text-shadow: 0 0 10px #00ff41;
      background: rgba(0,255,65,0.06);
    }
    .sep { color: rgba(255,255,255,0.1); margin: 0 0.2rem; }
    .ctrl-btn {
      background: rgba(20,20,20,0.9);
      border: 1px solid rgba(0,255,65,0.25);
      color: #00ff41;
      padding: 0.3rem 0.8rem;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .ctrl-btn:hover { background: rgba(0,255,65,0.08); box-shadow: 0 0 8px rgba(0,255,65,0.2); }
    #cy-container {
      width: 100%;
      height: calc(100vh - 50px);
    }
    #draw-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 900;
      cursor: crosshair;
    }
    #draw-overlay.active { pointer-events: auto; }
    .ctrl-btn.draw-active {
      color: #ff4081 !important;
      border-color: #ff4081 !important;
      text-shadow: 0 0 10px #ff4081;
      background: rgba(255,64,129,0.1) !important;
    }
    .footer-info {
      position: fixed;
      bottom: 8px; left: 8px;
      font-size: 0.7rem;
      color: #666;
      background: rgba(5,5,5,0.9);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid rgba(0,255,65,0.15);
      z-index: 2000;
    }

<div class="controls">
  <div class="tab active" data-tab="saas">SaaS (Historical)</div>

// ============================================================
// CYTOSCAPE
// ============================================================
var cy = null;
var currentTab = 'saas';

function storageKey() { return 'cy-pos-' + currentTab; }

function savePos() {
  var pos = {};
  cy.nodes().forEach(function(nd) { if (!nd.isParent()) pos[nd.id()] = nd.position(); });
  try { localStorage.setItem(storageKey(), JSON.stringify(pos)); } catch(e) {}
}

function loadPos() {
  try { var d = localStorage.getItem(storageKey()); return d ? JSON.parse(d) : null; } catch(e) { return null; }
}

function initGraph(tab) {
  currentTab = tab;
  var tabData = {
    'saas': { nodes: saasNodes, edges: saasEdges, pos: saasPos },
    'paas': { nodes: paasNodes, edges: paasEdges, pos: paasPos },
    'paas-hybrid': { nodes: paasHybridNodes, edges: paasHybridEdges, pos: paasHybridPos },
    'paas-hybrid-1': { nodes: paasHybrid1Nodes, edges: paasHybrid1Edges, pos: paasHybrid1Pos },
    'paas-hybrid-2': { nodes: paasHybrid2Nodes, edges: paasHybrid2Edges, pos: paasHybrid2Pos },
    'paas-future': { nodes: paasFutureNodes, edges: paasFutureEdges, pos: paasFuturePos },
  };
  var d = tabData[tab] || tabData['saas'];
  var nodes = d.nodes;
  var edges = d.edges;
  var defPos = d.pos;
  var saved = loadPos();
  var positions = saved || defPos;

  if (cy) cy.destroy();

  cy = cytoscape({
    container: document.getElementById('cy-container'),
    elements: { nodes: nodes, edges: edges },
    style: cyStyle,
    layout: {
      name: 'preset',
      positions: function(node) { return positions[node.id()] || {x:480,y:400}; },
      fit: true,
      padding: 50,
    },
    minZoom: 0.2,
    maxZoom: 4,
    wheelSensitivity: 0.25,
    boxSelectionEnabled: false,
  });

  cy.on('dragfree', 'node', savePos);

  // Start animations
  startAnimations();
}

// ============================================================
// ANIMATIONS
// ============================================================
var animFrameId = null;
var animPaused = false;

function startAnimations() {
  if (animFrameId) cancelAnimationFrame(animFrameId);

  // 1. Edge flow animation (animated dash offset)
  var dashOffset = 0;
  function animateEdges() {
    dashOffset -= 0.8;
    cy.edges().forEach(function(edge) {
      var t = edge.data('type');
      if (t === 'mesh') {
        edge.style('line-dash-offset', dashOffset * 0.4);
      } else if (t === 'artifact-pull') {
        edge.style('line-dash-offset', dashOffset * 1.2);
      } else {
        edge.style('line-dash-offset', dashOffset);
      }
    });
  }

  // 2. Node border glow pulse
  var pulsePhase = 0;
  function animateNodes() {
    pulsePhase += 0.03;
    cy.nodes().forEach(function(node) {
      if (node.isParent()) return;
      var type = node.data('type');
      var baseWidth;
      if (type === 'cloud') baseWidth = 2.5;
      else if (type === 'tentpole' || type === 'expressroute' || type === 'internet' || type === 'artifactory') baseWidth = 2;
      else baseWidth = 1.5;

      // Each node gets a slightly different phase based on id hash
      var idHash = 0;
      var id = node.id();
      for (var i = 0; i < id.length; i++) idHash += id.charCodeAt(i);
      var nodePhase = pulsePhase + (idHash % 10) * 0.628;

      var pulse = Math.sin(nodePhase) * 0.5 + 0.5; // 0..1
      var bw = baseWidth + pulse * 1.2;
      var opacity = 0.7 + pulse * 0.3;
      node.style('border-width', bw);
      node.style('border-opacity', opacity);
    });
  }

  // 3. Canvas overlay for data packets traveling along edges
  var canvas = document.getElementById('packet-canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'packet-canvas';
    canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;';
    document.getElementById('cy-container').style.position = 'relative';
    document.getElementById('cy-container').appendChild(canvas);
  }
  var ctx = canvas.getContext('2d');

  // Packet pool
  var packets = [];
  function initPackets() {
    packets = [];
    cy.edges().forEach(function(edge) {
      var type = edge.data('type');
      if (type === 'mesh') return; // no packets on mesh
      var color = edge.data('color');
      // 1-2 packets per edge at different phases
      var count = (type === 'artifact-pull') ? 1 : 2;
      for (var i = 0; i < count; i++) {
        packets.push({
          edge: edge,
          t: Math.random(), // position along edge 0..1
          speed: 0.002 + Math.random() * 0.003,
          color: color,
          size: (type === 'artifact-pull') ? 3 : 2.5,
        });
      }
    });
  }
  initPackets();

  function drawPackets() {
    var container = document.getElementById('cy-container');
    var rect = container.getBoundingClientRect();
    canvas.width = rect.width * (window.devicePixelRatio || 1);
    canvas.height = rect.height * (window.devicePixelRatio || 1);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform((window.devicePixelRatio || 1), 0, 0, (window.devicePixelRatio || 1), 0, 0);
    ctx.clearRect(0, 0, rect.width, rect.height);

    var pan = cy.pan();
    var zoom = cy.zoom();

    packets.forEach(function(pkt) {
      pkt.t += pkt.speed;
      if (pkt.t > 1) pkt.t -= 1;

      var src = pkt.edge.source();
      var tgt = pkt.edge.target();
      var sp = src.position();
      var tp = tgt.position();

      // Interpolate position
      var x = sp.x + (tp.x - sp.x) * pkt.t;
      var y = sp.y + (tp.y - sp.y) * pkt.t;

      // Transform to screen coords
      var sx = x * zoom + pan.x;
      var sy = y * zoom + pan.y;

      var r = pkt.size * zoom;
      if (r < 1) r = 1;
      if (r > 6) r = 6;

      // Glow
      ctx.beginPath();
      ctx.arc(sx, sy, r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = pkt.color.replace(')', ',0.15)').replace('rgb', 'rgba').replace('#', '');
      // Convert hex to rgba for glow
      var gc = hexToRgba(pkt.color, 0.2);
      ctx.fillStyle = gc;
      ctx.fill();

      // Packet dot
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fillStyle = pkt.color;
      ctx.shadowColor = pkt.color;
      ctx.shadowBlur = 8 * zoom;
      ctx.fill();
      ctx.shadowBlur = 0;
    });
  }

  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // Animation loop
  function loop() {
    if (animPaused) {
      animFrameId = requestAnimationFrame(loop);
      return;
    }
    animateEdges();
    animateNodes();
    drawPackets();
    animFrameId = requestAnimationFrame(loop);
  }
  loop();
}

function toggleAnim() {
  animPaused = !animPaused;
  var btn = document.getElementById('btn-anim');
  btn.textContent = animPaused ? 'PLAY' : 'PAUSE';
  if (animPaused) {
    // Clear packet canvas
    var canvas = document.getElementById('packet-canvas');
    if (canvas) {
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
}

// EVENTS

document.addEventListener('DOMContentLoaded', function() { initGraph('saas'); });

document.querySelectorAll('.tab').forEach(function(tab) {

document.getElementById('btn-fit').addEventListener('click', function() {

});

document.getElementById('btn-reset').addEventListener('click', function() {
  localStorage.removeItem('cy-pos-saas');
  localStorage.removeItem('cy-pos-paas');
  localStorage.removeItem('cy-pos-paas-hybrid');
  localStorage.removeItem('cy-pos-paas-hybrid-1');
  localStorage.removeItem('cy-pos-paas-hybrid-2');
  localStorage.removeItem('cy-pos-paas-future');
  animPaused = false;
  document.getElementById('btn-anim').textContent = 'PAUSE';
  initGraph(currentTab);
});

document.getElementById('btn-anim').addEventListener('click', toggleAnim);

// Export positions as JSON file
document.getElementById('btn-export').addEventListener('click', function() {
  var data = {
    tab: currentTab,
    positions: {}
  };
  cy.nodes().forEach(function(nd) {
    if (!nd.isParent()) data.positions[nd.id()] = nd.position();
  });
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'layout-' + currentTab + '.json';
  a.click();
  URL.revokeObjectURL(url);
});


// ============================================================
// FREEHAND DRAWING
// ============================================================
var drawCanvas = document.getElementById('draw-overlay');
var drawCtx = drawCanvas.getContext('2d');
var drawing = false;
var drawMode = false;

function resizeDrawCanvas() {
  var container = document.getElementById('cy-container');
  drawCanvas.width = container.offsetWidth;
  drawCanvas.height = container.offsetHeight;
}
resizeDrawCanvas();
window.addEventListener('resize', resizeDrawCanvas);

drawCanvas.addEventListener('mousedown', function(e) {
  if (!drawMode) return;
  drawing = true;
  drawCtx.beginPath();
  drawCtx.moveTo(e.offsetX, e.offsetY);
  drawCtx.strokeStyle = '#ff4081';
  drawCtx.lineWidth = 2;
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
});

drawCanvas.addEventListener('mousemove', function(e) {
  if (!drawing) return;
  drawCtx.lineTo(e.offsetX, e.offsetY);
  drawCtx.stroke();
});

drawCanvas.addEventListener('mouseup', function() { drawing = false; });
drawCanvas.addEventListener('mouseleave', function() { drawing = false; });

// Touch support
drawCanvas.addEventListener('touchstart', function(e) {
  if (!drawMode) return;
  e.preventDefault();
  var touch = e.touches[0];
  var rect = drawCanvas.getBoundingClientRect();
  drawing = true;
  drawCtx.beginPath();
  drawCtx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
  drawCtx.strokeStyle = '#ff4081';
  drawCtx.lineWidth = 2;
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
}, { passive: false });

drawCanvas.addEventListener('touchmove', function(e) {
  if (!drawing) return;
  e.preventDefault();
  var touch = e.touches[0];
  var rect = drawCanvas.getBoundingClientRect();
  drawCtx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
  drawCtx.stroke();
}, { passive: false });

drawCanvas.addEventListener('touchend', function() { drawing = false; });

document.getElementById('btn-draw').addEventListener('click', function() {
  drawMode = !drawMode;
  drawCanvas.classList.toggle('active', drawMode);
  this.classList.toggle('draw-active', drawMode);
  this.textContent = drawMode ? 'DRAW ON' : 'DRAW';
  if (cy) {
    cy.userPanningEnabled(!drawMode);
    cy.userZoomingEnabled(!drawMode);
    cy.boxSelectionEnabled(!drawMode);
    cy.autoungrabify(drawMode);
  }
});

document.getElementById('btn-clear').addEventListener('click', function() {
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
});

// Export SVG of current tab
document.getElementById('btn-svg').addEventListener('click', function() {
  var svgContent = cy.svg({ scale: 1, full: true, bg: '#050508' });
  var blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'platform-' + currentTab + '.svg';
  a.click();
  URL.revokeObjectURL(url);
});

document.addEventListener('keydown', function(ev) {
  if (ev.key==='p'||ev.key==='P') toggleAnim();
  else if (ev.key==='1') document.querySelector('[data-tab="saas"]').click();
  else if (ev.key==='2') document.querySelector('[data-tab="paas"]').click();
  else if (ev.key==='3') document.querySelector('[data-tab="paas-hybrid"]').click();
  else if (ev.key==='4') document.querySelector('[data-tab="paas-hybrid-1"]').click();
  else if (ev.key==='5') document.querySelector('[data-tab="paas-hybrid-2"]').click();
  else if (ev.key==='6') document.querySelector('[data-tab="paas-future"]').click();
  else if (ev.key==='f'||ev.key==='F') document.getElementById('btn-fit').click();
  else if (ev.key==='r'||ev.key==='R') document.getElementById('btn-reset').click();
  else if (ev.key==='d'||ev.key==='D') document.getElementById('btn-draw').click();
});
