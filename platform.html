  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary-green: #00ff41;
      --secondary-blue: #0080ff;
      --tertiary-pink: #ff4081;
      --bg-dark: #0a0a0a;
      --bg-darker: #050505;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --border-glow: rgba(0, 255, 65, 0.3);
      --shadow-glow: 0 0 20px rgba(0, 255, 65, 0.3);
      --orange: #ffaa00;
      --purple: #c084fc;
      --cyan: #00ffff;
    }

    body {
      font-family: 'VT323', monospace;
      background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 50%, #0a0f1a 100%);
      min-height: 100vh;
      color: var(--text-primary);
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12), rgba(0,0,0,0.12) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
      z-index: 9998;
      opacity: 0.5;
    }

    .header {
      padding: 0.8rem 2rem 0;
      text-align: center;
    }

    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(45deg, var(--primary-green), var(--secondary-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 2rem 0.3rem;
      flex-wrap: wrap;
    }

    .tab {
      background: rgba(15, 15, 15, 0.8);
      border: 1px solid rgba(0, 255, 65, 0.2);
      padding: 0.4rem 1.5rem;
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      color: var(--text-secondary);
      transition: all 0.3s ease;
      border-radius: 6px;
    }

    .tab:hover { color: var(--primary-green); background: rgba(0, 255, 65, 0.05); }

    .tab.active {
      color: var(--primary-green);
      background: rgba(0, 255, 65, 0.08);
      border-color: var(--primary-green);
      text-shadow: 0 0 8px var(--primary-green);
    }

    .tab-indicator {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .tab[data-tab="saas"] .tab-indicator { background: var(--primary-green); box-shadow: 0 0 6px var(--primary-green); }
    .tab[data-tab="paas"] .tab-indicator { background: var(--secondary-blue); box-shadow: 0 0 6px var(--secondary-blue); }

    .sep { color: rgba(255,255,255,0.12); margin: 0 0.2rem; }

    .ctrl-btn {
      background: rgba(15, 15, 15, 0.9);
      border: 1px solid rgba(0, 255, 65, 0.3);
      color: var(--primary-green);
      padding: 0.3rem 0.7rem;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .ctrl-btn:hover { background: rgba(0, 255, 65, 0.1); box-shadow: 0 0 8px rgba(0, 255, 65, 0.3); }

    #cy-container {
      margin: 0.3rem 1rem 0;
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      background: rgba(5, 5, 5, 0.95);
      box-shadow: var(--shadow-glow);
      height: calc(100vh - 100px);
    }

    .footer-info {
      position: fixed;
      bottom: 10px; left: 10px;
      font-size: 0.75rem;
      color: #b0b0b0;
      background: rgba(10, 10, 10, 0.95);
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border-glow);
      backdrop-filter: blur(10px);
      z-index: 2000;
      box-shadow: var(--shadow-glow);
    }

    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
  </style>
</head>

// ============================================================
// CYTOSCAPE INSTANCE
// ============================================================
var cy = null;
var currentTab = 'saas';

function getStorageKey() {
  return 'cy-positions-' + currentTab;
}

function savePositions() {
  var positions = {};
  cy.nodes().forEach(function(n) {
    if (!n.isParent()) {
      positions[n.id()] = n.position();
    }
  });
  try { localStorage.setItem(getStorageKey(), JSON.stringify(positions)); } catch(e) {}
}

function loadSavedPositions() {
  try {
    var data = localStorage.getItem(getStorageKey());
    if (!data) return null;
    return JSON.parse(data);
  } catch(e) { return null; }
}

function initGraph(tab) {
  currentTab = tab;
  var nodes = tab === 'saas' ? saasNodes : paasNodes;
  var edges = tab === 'saas' ? saasEdges : paasEdges;
  var defaultPos = tab === 'saas' ? saasPositions : paasPositions;
  var savedPos = loadSavedPositions();
  var positions = savedPos || defaultPos;

  if (cy) cy.destroy();

  cy = cytoscape({
    container: document.getElementById('cy-container'),
    elements: { nodes: nodes, edges: edges },
    style: sharedStyle,
    layout: {
      name: 'preset',
      positions: function(node) {
        return positions[node.id()] || { x: 480, y: 400 };
      },
      fit: !savedPos,
      padding: 40,
    },
    minZoom: 0.3,
    maxZoom: 3,
    wheelSensitivity: 0.3,
    boxSelectionEnabled: false,
  });

  // Save on drag
  cy.on('dragfree', 'node', function() {
    savePositions();
  });

  // Fit if first load
  if (!savedPos) {
    cy.fit(undefined, 40);
  }
}

// ============================================================
// INIT & EVENTS
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  initGraph('saas');
});

// Tabs
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    this.classList.add('active');
    initGraph(this.getAttribute('data-tab'));
  });
});

// Fit
document.getElementById('btn-fit').addEventListener('click', function() {
  if (cy) cy.animate({ fit: { eles: cy.elements(), padding: 40 }}, { duration: 400 });
});

// Reset
document.getElementById('btn-reset').addEventListener('click', function() {
  localStorage.removeItem('cy-positions-saas');
  localStorage.removeItem('cy-positions-paas');
  initGraph(currentTab);
});

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === '1') document.querySelector('[data-tab="saas"]').click();
  else if (e.key === '2') document.querySelector('[data-tab="paas"]').click();
  else if (e.key === 'f' || e.key === 'F') document.getElementById('btn-fit').click();
  else if (e.key === 'r' || e.key === 'R') document.getElementById('btn-reset').click();
});
</script>
